        <text x="50" y="112" font-size="34" font-weight="700" fill="#FAF7EF">句子怎样成为镜头</text>
        <text x="50" y="147" font-size="16" fill="#B9BCB9">文本 · 分镜 · 调度 · 剪辑</text>
