        <text x="50" y="112" font-size="34" font-weight="700" fill="#FAF7EF">路线就是叙事</text>
        <text x="50" y="147" font-size="16" fill="#B9BCB9">选择 · 悬念 · 超越 · 结果</text>
        <rect x="50" y="186" width="355" height="182" rx="7" fill="#F2EBDD"/>
        <text x="72" y="223" font-size="12" font-weight="700" fill="#D94A3A">QUESTION / 策展问题</text>
        
    <text x="72" y="270" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, sans-serif" font-size="20" font-weight="700" fill="#151617" text-anchor="start">
        <tspan x="72" dy="0">一条路线怎样承担角色选择、</tspan><tspan x="72" dy="34">悬念与结果？</tspan>
    </text>
        <rect x="50" y="396" width="112" height="28" rx="14" fill="#D99B3F"/>
