<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
    
    <defs>
        <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M24 0H0V24" fill="none" stroke="#B9BCB9" stroke-width="1" opacity="0.22"/>
        </pattern>
        <pattern id="micro" width="8" height="8" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.7" fill="#F2EBDD" opacity="0.14"/>
        </pattern>
        <linearGradient id="paperFade" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FAF7EF"/>
            <stop offset="1" stop-color="#DDD4C4"/>
        </linearGradient>
        <linearGradient id="roadFade" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#3D4043"/>
            <stop offset="1" stop-color="#191A1B"/>
        </linearGradient>
        <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.22"/>
        </filter>
    </defs>
    <rect width="960" height="540" fill="#151617"/>
    <rect width="960" height="540" fill="url(#micro)" opacity="0.45"/>
    <rect x="0" y="0" width="12" height="540" fill="#D99B3F"/>
    <g font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, sans-serif">
